<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
        }
        button {
            font-size: 1.2rem;
            padding: 1rem 2rem;
            background-color: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        button:hover {
            transform: scale(1.05);
        }
    </style>
</head>
<body>
    <h1>Hello from Subagent POC!</h1>
    <button onclick="showAlert()">Click Me!</button>

    <script>
        function showAlert() {
            alert('Hello! This is a test from the Subagent POC.');
        }
    </script>
</body>
</html>
