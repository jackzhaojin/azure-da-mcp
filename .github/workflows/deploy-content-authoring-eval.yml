name: Deploy Content Authoring Eval to Oracle VM

# Triggers only on version tags (v*) for deterministic releases
# Deploys when:
# 1. A version tag (v1.0.0, v1.0.1, etc.) is pushed
# 2. Tag includes changes to content-authoring-eval/** or this workflow file
# 3. Version field in package.json has changed (checked in workflow)
on:
  push:
    tags:
      - 'v*'
    paths:
      - 'content-authoring-eval/**'
      - '.github/workflows/deploy-content-authoring-eval.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/content-authoring-eval

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      version_changed: ${{ steps.version_check.outputs.version_changed }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2  # Need previous commit to compare version

      - name: Check if version changed
        id: version_check
        run: |
          # Get version from current commit
          CURRENT_VERSION=$(jq -r '.version' content-authoring-eval/package.json)

          # Get version from previous commit (if exists)
          PREVIOUS_VERSION=$(git show HEAD~1:content-authoring-eval/package.json 2>/dev/null | jq -r '.version' || echo "0.0.0")

          echo "Current version: $CURRENT_VERSION"
          echo "Previous version: $PREVIOUS_VERSION"

          if [ "$CURRENT_VERSION" != "$PREVIOUS_VERSION" ]; then
            echo "Version changed from $PREVIOUS_VERSION to $CURRENT_VERSION"
            echo "version_changed=true" >> $GITHUB_OUTPUT
          else
            echo "Version unchanged at $CURRENT_VERSION - skipping deployment"
            echo "version_changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Free Disk Space (Ubuntu)
        if: steps.version_check.outputs.version_changed == 'true'
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Set up Docker Buildx
        if: steps.version_check.outputs.version_changed == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: steps.version_check.outputs.version_changed == 'true'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        if: steps.version_check.outputs.version_changed == 'true'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        if: steps.version_check.outputs.version_changed == 'true'
        uses: docker/build-push-action@v5
        with:
          context: ./content-authoring-eval
          file: ./content-authoring-eval/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,compression=zstd

  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: |
      needs.build-and-push.outputs.version_changed == 'true' &&
      startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Navigate to application directory
            cd ~/jack-dev-server-configs/server/oracle-arm4-free-vm/deploy || exit 1

            # Pull latest image (public, no login needed)
            docker pull ghcr.io/${{ github.repository }}/content-authoring-eval:latest

            # Stop and remove old container
            docker compose down || true

            # Start new container
            docker compose up -d

            # Clean up old images
            docker image prune -af --filter "until=24h"

            # Show running containers
            docker ps

            # Show container logs (last 50 lines)
            docker compose logs --tail=50

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Wait for container to be healthy
            cd ~/jack-dev-server-configs/server/oracle-arm4-free-vm/deploy
            echo "Waiting for container to be healthy..."
            for i in {1..30}; do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q app) 2>/dev/null || echo "starting")
              echo "Health check attempt $i: $HEALTH"
              if [ "$HEALTH" = "healthy" ]; then
                echo "Container is healthy!"
                exit 0
              fi
              sleep 2
            done
            echo "Container failed to become healthy"
            docker compose logs --tail=100 app
            exit 1
