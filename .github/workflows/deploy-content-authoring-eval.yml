name: Deploy Content Authoring Eval to Oracle VM

# Triggers only on v1.x version tags — the frozen content-authoring-eval line (D5).
# v2.x+ tags belong to the agents/ A2A platform and must NOT deploy this app.
# NOTE: GitHub ignores `paths` filters on tag pushes, so the tag pattern is the
# only effective gate here. Keep it scoped to v1.*.
on:
  push:
    tags:
      - 'v1.*'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/content-authoring-eval

jobs:
  build-and-push:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: false

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=raw,value=latest
            type=sha,prefix=sha-

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./content-authoring-eval
          file: ./content-authoring-eval/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: false
          sbom: false
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max,compression=zstd

  deploy:
    name: Deploy to Oracle VM
    runs-on: ubuntu-latest
    needs: build-and-push
    if: startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Deploy to Oracle VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Navigate to application directory
            cd ~/jack-dev-server-configs/server/oracle-arm4-free-vm/deploy || exit 1

            # Pull latest image (public, no login needed)
            docker pull ghcr.io/${{ github.repository }}/content-authoring-eval:latest

            # Stop and remove old container
            docker compose down || true

            # Start new container
            docker compose up -d

            # Clean up old images
            docker image prune -af --filter "until=24h"

            # Show running containers
            docker ps

            # Show container logs (last 50 lines)
            docker compose logs --tail=50

      - name: Verify deployment
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ORACLE_HOST }}
          username: ${{ secrets.ORACLE_USER }}
          key: ${{ secrets.ORACLE_SSH_KEY }}
          script: |
            # Wait for container to be healthy
            cd ~/jack-dev-server-configs/server/oracle-arm4-free-vm/deploy
            echo "Waiting for container to be healthy..."
            for i in {1..30}; do
              HEALTH=$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q app) 2>/dev/null || echo "starting")
              echo "Health check attempt $i: $HEALTH"
              if [ "$HEALTH" = "healthy" ]; then
                echo "Container is healthy!"
                exit 0
              fi
              sleep 2
            done
            echo "Container failed to become healthy"
            docker compose logs --tail=100 app
            exit 1
