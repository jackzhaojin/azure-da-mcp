# Fast-tier e2e for the A2A agent platform (agents/ only — never touches the
# frozen content-authoring-eval deploy, D5). Stub engine: no browsers, no API
# keys, ~15s of real protocol tests over real child-process servers.
name: agents-e2e

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - ".github/workflows/agents-e2e.yml"
  pull_request:
    paths:
      - "agents/**"
      - ".github/workflows/agents-e2e.yml"

jobs:
  fast-suite:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: agents
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: agents/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run test:e2e
