<article class="blog-card">
  <div class="blog-card__content">
    <h3 class="blog-card__title"><a href="{{LINK}}">{{TITLE}}</a></h3>
    <p class="blog-card__teaser">{{TEASER}}</p>
    <div class="blog-card__meta">
      <span class="blog-card__date">{{DATE}}</span>
      <span class="blog-card__tags">{{TAGS}}</span>
    </div>
  </div>
</article>
