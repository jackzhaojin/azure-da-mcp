<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{TITLE}}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            line-height: 1.6;
            color: #333;
            background: #fff;
            padding: 40px;
        }

        .header {
            margin-bottom: 40px;
            border-bottom: 3px solid #000;
            padding-bottom: 20px;
        }

        h1 {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 10px;
            color: #000;
        }

        .teaser {
            font-size: 18px;
            color: #666;
            font-style: italic;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .metadata {
            font-size: 14px;
            color: #999;
        }

        .metadata span {
            margin-right: 20px;
        }

        .content {
            margin-top: 40px;
        }

        .content p {
            margin-bottom: 20px;
            font-size: 16px;
            line-height: 1.8;
        }

        .content h2 {
            font-size: 24px;
            font-weight: 600;
            margin-top: 40px;
            margin-bottom: 15px;
            color: #000;
        }

        .content h3 {
            font-size: 20px;
            font-weight: 600;
            margin-top: 30px;
            margin-bottom: 12px;
            color: #333;
        }

        .content ul,
        .content ol {
            margin-bottom: 20px;
            margin-left: 30px;
        }

        .content li {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        .content img {
            max-width: 100%;
            height: auto;
            margin: 30px 0;
            border-radius: 4px;
        }

        .content pre {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            overflow-x: auto;
            margin-bottom: 20px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .content code {
            background: #f5f5f5;
            padding: 2px 6px;
            border-radius: 3px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
        }

        .content pre code {
            background: none;
            padding: 0;
        }

        .image-container {
            margin: 30px 0;
            text-align: center;
        }

        .image-container img {
            margin: 0;
        }

        .image-caption {
            font-size: 14px;
            color: #666;
            font-style: italic;
            margin-top: 10px;
        }

        @media print {
            body {
                padding: 0;
            }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>{{TITLE}}</h1>
        {{#if TEASER}}
        <p class="teaser">{{TEASER}}</p>
        {{/if}}
        <div class="metadata">
            {{#if AUTHOR}}<span><strong>Author:</strong> {{AUTHOR}}</span>{{/if}}
            {{#if DATE}}<span><strong>Date:</strong> {{DATE}}</span>{{/if}}
            {{#if TAGS}}<span><strong>Tags:</strong> {{TAGS}}</span>{{/if}}
        </div>
    </div>

    <div class="content">
        {{CONTENT}}
    </div>
</body>
</html>
