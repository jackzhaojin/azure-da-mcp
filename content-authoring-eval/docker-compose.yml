version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: content-authoring-eval:latest
    container_name: content-authoring-eval
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - CLAUDE_CODE_OAUTH_TOKEN=${CLAUDE_CODE_OAUTH_TOKEN}
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-5-20250929}
    env_file:
      - .env.local
    volumes:
      # Optional: Mount screenshots directory for development
      - ./public/screenshots:/app/public/screenshots
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/evaluate', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      start_period: 40s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '1'
          memory: 512M
