version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.debug
    container_name: content-eval-debug
    ports:
      - "3005:3000"
    env_file:
      - .env.docker
    environment:
      - DEBUG=*
      - NODE_OPTIONS=--inspect=0.0.0.0:9229
    volumes:
      - ./debug-logs:/tmp/debug-logs
    restart: "no"
    stdin_open: true
    tty: true
